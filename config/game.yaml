    file: "config/bots/sentinel_alpha.yaml"
    name: Sentinel-Alpha
    team: red

  - bot_id: bot_02
    file: "config/bots/reaper_v.yaml"
    name: Reaper-V
    team: blue

  - bot_id: bot_03
    file: "config/bots/bramble_druid.yaml"
    name: Bramble-Druid
    team: green

  - bot_id: bot_04
    file: "config/bots/vanguard_beta.yaml"
    name: Vanguard-Beta
    team: yellow
