game_id: game_002

board:
  radius: 10
  boundary_type: hard_wall
  storm_enabled: false
  storm_start_cycle: null
  storm_shrink_interval: null

rules:
  turn_limit: 200
  memory_max_characters: 400
  starvation_warning_threshold: 10
  max_cycles: 20

llm:
  provider: ollama
  model: llama3.2:latest
  base_url: http://127.0.0.1:11434
  temperature: 0.7
  timeout_seconds: 60

