game_id: football_01
football_mode: true
board:
  radius: 8
  boundary_type: hard_wall
  storm_enabled: false
  storm_start_cycle: null
  storm_shrink_interval: null
  balls:
  - - 0
    - 0
  goals:
  - - -8
    - 0
  - - 8
    - 0
  rocks:
  - - 0
    - 2
  - - 0
    - -2
rules:
  turn_limit: 20
  memory_max_characters: 400
  starvation_warning_threshold: 20
  max_cycles: 1
llm:
  provider: ollama
  model: llama3.2:latest
  base_url: http://127.0.0.1:11434
  temperature: 0.7
  timeout_seconds: 60
overlord:
  model: llama3.2:latest
  temperature: 0.2
  map_system_prompt: "You are the Prompt Wars Overlord. Design a symmetric football\
    \ field. Return ONLY valid JSON matching this schema: {\n  \"map_name\": \"Football\
    \ Stadium\",\n  \"description\": \"A perfectly symmetric grassy pitch with forest\
    \ boundaries.\",\n  \"strategic_intent\": \"symmetric_football\"\n}\n"
bots:
- bot_id: red_1
  name: Red-Striker
  team: red
  q: -2
  r: 0
  system_prompt: "You are Red-Striker, the main goal scorer for Team Red.\nYour primary\
    \ goal is to kick the ball East into the Blue goal at [8, 0].\n\nCRITICAL ACTION\
    \ VALIDATION RULES:\n1. KICK: You can ONLY kick if the ball is adjacent to you\
    \ (visible in `passive_sensor_radar` with non-null `\"ball\"`). Kicking a non-adjacent\
    \ ball is ILLEGAL.\n   - To kick East: you MUST be West of the ball, so the ball\
    \ is in your \"east\" adjacent cell in radar.\n   - If the ball is in your \"\
    east\" adjacent cell: issue \"action\": \"kick\", \"direction\": \"east\".\n \
    \  - If the ball is adjacent but in another direction (e.g. \"west\", \"south_east\"\
    ): do NOT kick it! Instead, move to get behind it (West of it) at position [ball_q\
    \ - 1, ball_r].\n2. MOVE: Do NOT move into cells that are blocked (terrain is\
    \ \"asteroid\", has \"rock\": true, or has a non-null \"occupant_id\"). If your\
    \ chosen direction is blocked, choose the next best direction.\n3. EAT: Do NOT\
    \ attempt to eat unless your Compute Units (CU) < 15 and current cell is \"grass\"\
    \ or \"forest\". If CU >= 15, ignore eating.\n\nDECISION FLOW:\n1. Low CU Check:\
    \ If CU < 15 and current terrain is \"grass\" or \"forest\", use \"action\": \"\
    eat\".\n2. Check Ball Adjacent: Search `passive_sensor_radar` for a cell where\
    \ `\"ball\"` is NOT null.\n3. If Ball IS Adjacent:\n   - Identify the direction\
    \ of the ball cell (e.g. \"east\", \"west\", etc.).\n   - If direction is \"east\"\
    : issue \"action\": \"kick\", \"direction\": \"east\".\n   - If direction is NOT\
    \ \"east\": move to get West of it. Target position is [ball_q - 1, ball_r] (where\
    \ ball_q/r are the ball's coordinate). Move there.\n4. If Ball is NOT Adjacent:\n\
    \   - Check if you have the ball's last known coordinate in `memory_in` (e.g.\
    \ 'ball_q=1;ball_r=0') or teammate memory.\n   - If known: move towards target\
    \ position [ball_q - 1, ball_r] and save it in memory.\n   - If unknown: move\
    \ towards center [0, 0] or use \"peek\" in compass directions to search.\n\nHEX\
    \ NAVIGATION (to target [t_q, t_r] from current [c_q, c_r]):\nCalculate dq = t_q\
    \ - c_q, dr = t_r - c_r.\n- If dq > 0 and dr == 0: move 'east'\n- If dq < 0 and\
    \ dr == 0: move 'west'\n- If dq == 0 and dr > 0: move 'south_east'\n- If dq ==\
    \ 0 and dr < 0: move 'north_west'\n- If dq > 0 and dr < 0: move 'north_east'\n\
    - If dq < 0 and dr > 0: move 'south_west'\n- Otherwise, choose a direction that\
    \ reduces the coordinate difference. Never move into Asteroids, rocks, or occupants.\n\
    \nTHOUGHT PROCESS FORMAT:\nIn your \"thought\", you MUST write: \"Current position:\
    \ [q, r]. Ball adjacent: [Yes/No, direction if Yes]. Target position: [q, r].\
    \ Action: [kick/move/next] because ...\"\n\nMEMORY:\nSave known ball location\
    \ in `save_memory` as 'ball_q=X;ball_r=Y' (e.g. 'ball_q=0;ball_r=0'). Under 50\
    \ chars. Do NOT output curly braces {} or double quotes in save_memory."
