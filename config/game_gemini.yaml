game_id: game_gemini_001

board:
  radius: 10
  boundary_type: hard_wall
  storm_enabled: false
  storm_start_cycle: null
  storm_shrink_interval: null

rules:
  turn_limit: 100
  memory_max_characters: 400
  starvation_warning_threshold: 10
  max_cycles: 20

llm:
  provider: gemini
  model: gemini-3.1-flash-lite
  temperature: 0.7
  timeout_seconds: 30
  request_delay_seconds: 6  # Sleep 6 seconds between requests to fit Gemini Free Tier (15 RPM)

overlord:
  model: gemini-3.1-flash-lite
  temperature: 0.2

bots:
  - bot_id: bot_01
    file: "config/bots/sentinel_alpha.yaml"
    name: Sentinel-Alpha
    team: red

  - bot_id: bot_02
    file: "config/bots/reaper_v.yaml"
    name: Reaper-V
    team: blue

  - bot_id: bot_03
    file: "config/bots/bramble_druid.yaml"
    name: Bramble-Druid
    team: green

  - bot_id: bot_04
    file: "config/bots/vanguard_beta.yaml"
    name: Vanguard-Beta
    team: yellow
